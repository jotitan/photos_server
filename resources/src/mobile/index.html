<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Photos mobile</title>

    <style>
        :root {
            --width-screen: 100px;
        }

        body {
            margin: 0;
            background-color: #001529;
            color: white;
        }

        a {
            color: white;
        }

        .folder > a {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: inline-block;
            width: var(--width-screen);
        }

        .remote-fullscreen {
            z-index: 2;
            position: absolute;
            width: 100vw;
            height: 100vh;
            top: 0;
            background-color: lightblue;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: linear-gradient(to top, #BBE2FC 0%, #07609C 0%);
        }

        .remote-fullscreen button {
            font-size: 10vh;
            margin: 10px;
            background-color: black;
            padding: 10px;
        }

        div.folder {
            margin-left: 10px;
            padding: 10px;
            cursor: pointer;
            border-bottom: solid 1px;
            font-size: 8vw
        }

        .folders {
            position: fixed;
            height: calc(100% - 9vh);
            overflow: scroll;
        }

        div.content {
            position: relative;
            z-index: 1;
        }

        img.thumbnail {
            cursor: pointer;
            margin-right: 2px;
        }

        div.viewer {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: rgba(50, 50, 50, 0.9);
            top: 0;
            z-index: 10;
            text-align: center;
            line-height: 100vh;
            overflow: hidden;
        }

        div.viewer img {
            vertical-align: middle;
        //transition: opacity 0.3s ease;
        }

        .hidden {
            display: none !important;
        }

        .open-hd {
            position: absolute;
            right: 0;
            top: 0;
            font-size: 10vw;
            z-index: 10;
        }

        .open-hd a {
            text-decoration: none;
            cursor: pointer;
        }

        .remote-controler {
            display: none;
            text-align: center;
            background-color: cornflowerblue;
        }

        .header.visible {
            display: block;
            border-bottom: solid 1px white;
            position: sticky;
            z-index: 100;
            background-color: #001529;
        }

        .header button {
            font-size: 4vh;
            margin: 10px;
            background-color: white;
            padding: 10px;
        }

        .status-remote {
            font-size: 10vw;
            color: black;
            text-align: center;
            padding-bottom: 20px;
            font-weight: 800;
        }

        .challenge {
            z-index: 1;
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            background-color: black;
            text-align: center;
            color: white;
            font-size: 3vw;
            display: grid;
            justify-content: center;
            align-items: center;
        }

        .challenge p {
            margin: 20px;
        }

        .challenge input::-webkit-outer-spin-button,
        .challenge input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* Hide spin buttons in Firefox */
        .challenge input[type="number"] {
            -moz-appearance: textfield;
        }

        .folder-name {
            font-size: 3vh;
            margin-left: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: calc(100% - 200px);
            display: inline-block;
        }

        .back-button {
            /* display: none;*/
        }

        .back-button.visible {
            display: inline;
        }

        div.viewer img.animeLeft {
            left: -100vw;
            transition: left 0.3s ease;
        }

        div.viewer img.animeRight {
            left: 100vw !important;
            transition: left 0.3s ease;
        }

        div.viewer img.animeMiddle {
            left: 0;
            transition: left 0.3s ease;
        }

        .toLeft {
            left: -100vw;
        }

        .toRight {
            left: 100vw;
        }

        div.viewer img {
            position: absolute;
        }

        .calendar {
            width:100vw;
            font-size:6vw;
            text-align:center;
        }
        .calendar > div {
            display:flex;
        }
        .calendar > div.names {
            font-weight:bold;
        }
        .calendar > div > div {
            flex:1;
        }
        .calendar div.has-photos {
            background-color : lightgreen;
            font-weight:bold;
            color:black;
        }
        .calendar .header-calendar button {
            font-size:7vw;
            width:10vw;
        }
        .calendar .current-date {
            flex:5;
            font-weight:bold;
            font-size:7vw;
            font-variant-caps: all-small-caps;
        }
        .menu > div {
            width:100%;
            font-size:25vh;
            text-align:center;
            position:absolute;
            cursor:pointer;
        }
        .menu > div:first-child {
            font-size:15vw;
        }
        .menu > div:nth-child(2) {
            top:10vh;
        }
        .menu > div:last-child {
            bottom:10vh;
        }
    </style>
</head>
<body>

<div class="footer remote-controler">
    <button class="load-folder">🛜</button>
    <button class="previous-photo">⏪</button>
    <button class="next-photo">⏩</button>
    <button class="remote-big" aria-label="🖼️📺➡️⬅️">📱</button>
    <button class="close-remote" style="right:0">❎</button>
</div>

<div class="header header-nav visible hidden">
    <button class="back-button">🔙</button>
    <button class="close-button hidden" style="background-color: #001529">❎</button>
    <span class="folder-name"></span>
    <div class="hidden open-hd"><a target="_blank">📷</a></div>
</div>
<div class="folders hidden">
    <div class="content"></div>
</div>

<div class="new-viewer viewer hidden">
    <img src="" class="toRight first-viewer" alt="show-img"/>
    <img src="" class="toRight second-viewer" alt="show-img"/>
</div>

<div class="hidden remote-fullscreen">
    <div>
        <div class="status-remote"><span class="current-photo"></span> / <span class="size-photo"></span></div>
        <div>
            <button class="previous-photo">⏪</button>
            <button class="next-photo">⏩</button>
            <button class="close-fullscreen" style="margin-left:20px">❎</button>
        </div>
    </div>
</div>
<div class="hidden challenge">
    <div style="height:50vh">
        <p>Name : <span class="name-remote"></span></p>
        <p>
            <button class="cancel-block">Cancel and block</button>
        </p>
        <p><input class="input-code" id="input-code" size="6" maxlength="6" type="number"/></p>
    </div>
</div>
<div style="top:200px;position:absolute;" class="calendar hidden">
    <div class="header-calendar">
        <div><button style="margin-left:5px;" onclick="calendar.previousYear()"> << </button></div>
        <div><button onclick="calendar.previous()"> < </button></div>
        <div class="current-date"></div>
        <div><button onclick="calendar.next()"> > </button></div>
        <div><button style="margin-right:5px;" onclick="calendar.nextYear()"> >> </button></div>
    </div>
    <div class="names">
        <div>L</div>
        <div>M</div>
        <div>M</div>
        <div>J</div>
        <div>V</div>
        <div>S</div>
        <div>D</div>
    </div>
</div>

<div class="menu">
    <div>Menu</div>
    <div onclick="menu.showFolder();">
        📂
    </div>
    <div onclick="menu.showCalendar();">
        📆
    </div>
</div>
</body>
</html>

<script>
    const baseUrl = location.href.substring(0, location.href.indexOf("/mobile"));
    const menu = new class Menu {
        showFolder(){
            showFolders();
            contentWrapper.show();
            calendar.disable();
            this.hide();
        }
        showCalendar(){
            calendar.show();
            this.hide();
        }
        hide(){
            document.querySelector('.menu').classList.add('hidden');
            document.querySelector('.header').classList.remove('hidden');
            updateHeader('');
        }
        show(){
            document.querySelector('.header').classList.add('hidden');
            calendar.hide();
            contentWrapper.hide();
            document.querySelector('.menu').classList.remove('hidden');
        }
    }
    const contentWrapper = new class Content{
        hide(){
            document.querySelector('.folders').classList.add('hidden');
        }
        show(){
            document.querySelector('.folders').classList.remove('hidden');
            touchDetector.detach(["left","right"])
            touchDetector.attachLeft(previousFolder)

        }
    }
    const calendar = new class Calendar{
        isEnable = true;
        constructor() {
            this.current = {year:new Date().getFullYear(),month:new Date().getMonth()}
            this.dates = new Map();
            this.loadDates().then(()=>this.draw());
        }
        loadPhotos(year,month,day){
            const date = `${year}${month < 10 ? '0':''}${month}${day<10?'0':''}${day}`
            const url = `${baseUrl}/getByDate?date=${date}`;
            updateHeader(`${day < 10 ? '0':''}${day} / ${month < 10 ? '0':''}${month} / ${year}`);
            this.hide();
            contentWrapper.show();
            fetch(url).then(d=>d.json()).then(showImagesFromFiles);
        }
        hide(){
            document.querySelector('.calendar').classList.add('hidden');
        }
        show(){
            updateHeader('');
            touchDetector.detach(["left"])
            touchDetector.attachLeft(()=>this.previous())
            touchDetector.attachRight(()=>this.next())
            document.querySelector('.calendar').classList.remove('hidden');
            contentWrapper.hide();
            this.enable();
        }

        disable(){
            this.isEnable = false;
        }
        enable(){
            this.isEnable = true;
        }
        loadDates(){
            return fetch(`${baseUrl}/allDates`).then(d=>d.json()).then(dates=>{
                dates.forEach(e=>{
                    const d = new Date(e.Date);
                    let arr = this.dates.get(d.getFullYear());
                    if(arr == null){
                        arr = [];
                        this.dates.set(d.getFullYear(),arr);
                    }
                    let days = arr[d.getMonth()];
                    if(days == null){
                        days = [];
                        arr[d.getMonth()] = days;
                    }
                    days.push({day:d.getDate(),nb:e.Nb});
                })
            });
        }
        getNbsByMonth(year, month){
            const dataYear = this.dates.get(year);
            if(dataYear == null){
                return new Map();
            }
            const dataMonth = dataYear[month];
            return dataMonth == null ? new Map() : dataMonth.reduce((a,b)=>a.set(b.day,b.nb),new Map());
        }
        getFirstDay = (year,month) => (new Date(year,month,1).getDay() + 6)%7;
        getNbDays = (year,month) => new Date(year,month+1,0).getDate();
        newWeek(){
            const d = document.createElement('div');
            d.classList.add('week');
            return d;
        }
        previousYear(){
            this.current.year--;
            this.draw();
        }
        nextYear(){
            this.current.year++;
            this.draw();
        }
        previous(){
            if(this.current.month === 0){
                this.current.month = 11;
                this.current.year--;
            }else{
                this.current.month--;
            }
            this.draw();
        }
        next(){
            if(this.current.month === 11){
                this.current.month = 0;
                this.current.year++;
            }else{
                this.current.month++;
            }
            this.draw();
        }
        showDate(){
            document.querySelector('.current-date').innerHTML = new Date(this.current.year, this.current.month).toLocaleString('default', {
                month: 'long',
                year: 'numeric'
            });
        }
        draw(year = this.current.year,month = this.current.month){
            this.current = {year:year,month:month};
            this.showDate();
            const nbs = this.getNbsByMonth(year,month) || new Map();
            const c = document.querySelector('.calendar');
            c.querySelectorAll('.week').forEach(n=>n.remove());
            // 0 is sunday
            let currentDay = this.getFirstDay(year, month)
            let week = this.newWeek();
            for(let i = 0 ; i < currentDay ; i++){
                week.append(document.createElement('div'));
            }
            currentDay++;
            const nbDays = this.getNbDays(year,month);
            for(let i = 1; i <= nbDays ; i++){
                if(currentDay>7){
                    currentDay = 1;
                    c.append(week);
                    week = this.newWeek();
                }
                const day = document.createElement('div')
                day.innerHTML = `${i}`;
                if(nbs.has(i)){
                    day.classList.add('has-photos')
                    day.onclick = ()=>this.loadPhotos(this.current.year,this.current.month+1,i);
                }
                week.append(day);
                currentDay++;
            }
            for(let i = currentDay ; i%7!==1 ; i++){
                week.append(document.createElement('div'));
            }
            c.append(week);
        }
    }

    const StackManager = {
        stack: [],
        push(data) {
            this.stack.push(data);
        },
        pop() {
            return this.stack.pop();
        }
    }

    const content = document.getElementsByClassName("content").item(0);
    const viewer = document.getElementsByClassName("viewer").item(0);
    const hdLink = document.getElementsByClassName("open-hd").item(0);

    const minHeight = 220;
    let buffer = [];
    let currentWidth = 0;
    let screenSize;
    let currentUrl = "";
    let folderSize = 0;
    let currentPanel = "folder";
    let images = [];
    let currentImage = -1;

    const showFolders = (data = rootFolders, previousName = '') => {
        content.innerHTML = '';
        data.sort((a, b) => a.Name.localeCompare(b.Name))
        data.forEach(e => {
            createFolder(e, data, previousName)
        })
    }

    const showFoldersAndImage = (e, data, previousName) => {
        const copy = structuredClone(e);
        copy.Name = 'Images';
        copy.Children = [];
        const copyData = structuredClone(data);
        if (!copyData.find(e => e.Name === 'Images')) {
            copyData.push(copy)
        }
        showSubFolders(e, copyData, e.Name, previousName)
        createFolder(copy, data, previousName)
    }

    const createFolder = (e, data, previousName) => {
        const div = document.createElement("div");
        div.classList.add('folder')
        const a = document.createElement("a")
        a.href = "#";
        a.append(`${e.Name}`)
        if (e.HasImages && e.Children.length === 0) {
            // Case images but no sub folder
            a.addEventListener('click', () => showImages(e.Link, data, e.Name, previousName))
        }
        if (!e.HasImages) {
            // Case only sub folders
            a.addEventListener('click', () => showSubFolders(e, data, e.Name, previousName))
        }
        if (e.HasImages && e.Children.length > 0) {
            // Case images and also sub folder
            a.addEventListener('click', () => showFoldersAndImage(e, data, previousName));
        }
        div.append(a);
        content.append(div)
    }

    let currentHeaderName = "";
    const updateHeader = name => {
        currentHeaderName = name;
        /*if (name === '') {
            //document.querySelector('.back-button').classList.remove('visible');
        } else {
            document.querySelector('.back-button').classList.add('visible');
        }*/
        document.querySelector('.folder-name').innerHTML = name;
    }
    const showSubFolders = (element, data, name, previousName) => {
        updateHeader(name);
        StackManager.push({children: data, name: name, previousName: previousName})
        showFolders(element.Children, name)
    }

    const showImages = (url, data, name, previousName) => {
        updateHeader(name);
        currentUrl = url;
        StackManager.push({children: data, name: name, previousName: previousName})
        // Load images
        fetch(`${baseUrl}${url}`).then(d => d.json()).then(showImagesFromFiles)
    }

    const showImagesFromFiles = data => {
        images = [];
        let counter = 0;
        let originalCounter = 0;
        folderSize = data.length;
        const files = data.Files.filter(a => a.HasImages == null);
        files.sort((a, b) => a.Date.localeCompare(b.Date))
        content.innerHTML = '';
        screenSize = document.getElementsByTagName('body')[0].offsetWidth - 15;
        files.forEach(img => {
            if (img.Height !== 0) {
                const estimatedWidth = minHeight * (img.Width / img.Height);
                if (currentWidth + estimatedWidth > screenSize) {
                    showBufferImages();
                }
                currentWidth += estimatedWidth
                buffer.push({
                    realWidth: estimatedWidth,
                    src: `${baseUrl}${img.ThumbnailLink}`,
                    hd: `${baseUrl}${img.ImageLink}`,
                    uhd: `${baseUrl}${img.HdLink}`,
                    height: img.Height,
                    width: img.Width,
                    pos: counter++,
                    originalPos: originalCounter
                });
            }
            originalCounter++;
        });
        showBufferImages()
    }

    const showBufferImages = () => {
        if (buffer.length === 0) {
            return
        }
        const actualWidth = buffer.reduce((count, i) => count + i.realWidth, 0);
        const delta = screenSize - actualWidth;
        const ratio = (1 + (delta / actualWidth));
        const adjustedHeight = minHeight * ratio;
        buffer.forEach(imgInfo => {
            const img = createImage(imgInfo.src);
            img.classList.add('thumbnail')
            img.height = adjustedHeight;
            img.width = Math.floor(imgInfo.realWidth * ratio) - 2;
            img.addEventListener('click', () => showImage(imgInfo))
            content.append(img)
            images.push(imgInfo)
        })
        buffer = [];
        currentWidth = 0;
    }
    const createImage = src => {
        const i = document.createElement('img')
        i.src = src;
        return i;
    }

    const showImage = (imgInfo,isNext=true) => {
        if (remoteControl.isExists()) {
            remoteControl.selectImage(imgInfo.originalPos);
            return;
        }
        touchDetector.detach(["left"])
        content.classList.add('hidden')
        currentImage = imgInfo.pos;
        viewer.classList.remove('hidden');
        hdLink.classList.remove('hidden');
        hdLink.getElementsByTagName('a').item(0).href = imgInfo.uhd;

        showViewer();
        switchImage(imgInfo, isNext);

        touchDetector.attachLeft(previous)
        touchDetector.attachRight(next)
        touchDetector.attachTop(hideImage)
        currentPanel = "image";
    }

    document.addEventListener("keyup", e => {
        if (currentPanel === "image") {
            switch (e.key) {
                case "ArrowLeft":
                    previous();
                    break;
                case "ArrowRight":
                    next();
                    break;
                case "Escape":
                    hideImage();
                    break;
            }
        } else {
            switch (e.key) {
                case "ArrowLeft":
                    previousFolder();
                    break;
            }
        }
    })

    const hideImage = () => {
        hideViewer();
        currentPanel = "folder";
        viewer.classList.add('hidden');
        hdLink.classList.add('hidden');
        content.classList.remove('hidden')
        touchDetector.detach(["left", "right", "top"])
        touchDetector.attachLeft(previousFolder)
    }

    const previousFolder = () => {
        if(currentHeaderName === ''){
            return menu.show();
        }
        if(calendar.isEnable){
            return calendar.show();
        }
        const previousPage = StackManager.pop()
        updateHeader(previousPage.previousName);
        showFolders(previousPage.children, previousPage.previousName)
    }

    const previous = () => {
        if (currentImage === 0) {
            return;
        }
        showImage(images[currentImage - 1], false)
    }
    const next = () => {
        if (currentImage >= images.length - 1) {
            return;
        }
        showImage(images[currentImage + 1])
    }

    let isCurrentFirst = false;

    const showViewer = () => {
        document.querySelector('.new-viewer').classList.remove('hidden');
        document.querySelector('.back-button').classList.add('hidden');
        document.querySelector('.close-button').classList.remove('hidden');
    }

    const hideViewer = () => {
        document.querySelector('.new-viewer').classList.add('hidden');
        document.querySelector('.back-button').classList.remove('hidden');
        document.querySelector('.close-button').classList.add('hidden');
    }

    const setRatio = (img, info) => {
        const ratioImg = (info.height / info.width)
        const ratioScreen = (window.screen.height / window.screen.width)
        if(ratioImg < ratioScreen) {
            const realHeight = (info.height * window.innerWidth) / info.width;
            const shift = Math.round((window.innerHeight - realHeight)/2);
            img.style.setProperty("margin-top",shift + 'px')
        }else{
            img.style.setProperty("margin-top",0)
        }
        img.style.setProperty(ratioImg < ratioScreen ? "width" : "height", "100%")
    }

    const switchImage = (imgInfo, isNext) => {
        const imgToShow = document.querySelector(`.${isCurrentFirst ? 'first' : 'second'}-viewer`);
        const imgToHide = document.querySelector(`.${isCurrentFirst ? 'second' : 'first'}-viewer`);
        isCurrentFirst = !isCurrentFirst;
        imgToShow.src = imgInfo.hd;
        setRatio(imgToShow, imgInfo);

        const animeClass = isNext ? 'animeLeft':'animeRight';
        const replacer = isNext ? ["toLeft","toRight"] : ["toRight","toLeft"];
        imgToShow.classList.replace(replacer[0],replacer[1]);
        setTimeout(() => {
            imgToShow.classList.replace(replacer[1], 'animeMiddle');
            imgToHide.classList.replace('animeMiddle', animeClass);
            setTimeout(() => {
                imgToHide.classList.replace(animeClass, replacer[1]);
            }, 300)

        },100);
    }

    const remoteControl = new class RemoteControler {
        constructor() {
            document.querySelectorAll('.previous-photo').forEach(i => i.addEventListener('click', () => this.previous()))
            document.querySelectorAll('.next-photo').forEach(i => i.addEventListener('click', () => this.next()))
            document.getElementsByClassName('load-folder').item(0).addEventListener('click', () => this.loadFolder())
            document.getElementsByClassName('close-fullscreen').item(0).addEventListener('click', () => this.hideFullscreen())
            document.getElementsByClassName('remote-big').item(0).addEventListener('click', () => this.fullscreen())
            document.getElementsByClassName('close-remote').item(0).addEventListener('click', () => this.close())
            this.name = "";
            this.current = 0;
            this.size = 0;
            this.checkExisting();
        }

        close() {
            this.name = "";
            document.getElementsByClassName('remote-controler').item(0).classList.remove('visible')
        }

        fullscreen() {
            // Get status of full screen
            fetch(`${baseUrl}/remote/status?name=${this.name}`).then(d => d.json()).then(data => {
                this.current = data.Current;
                this.size = data.Size;
                this.percent();
            })
            document.getElementsByClassName('remote-fullscreen').item(0).classList.remove('hidden');
        }

        hideFullscreen() {
            document.getElementsByClassName('remote-fullscreen').item(0).classList.add('hidden');
        }

        isExists() {
            return this.name !== '';
        }

        hideChallenge() {
            document.getElementsByClassName('challenge').item(0).classList.add('hidden');
            this.checkExisting()
        }

        showChallenge(list) {
            const div = document.getElementsByClassName('challenge').item(0);
            div.classList.remove('hidden');
            if (list.length === 1) {
                div.getElementsByClassName('name-remote').item(0).innerHTML = list[0]
                div.getElementsByClassName('cancel-block').item(0).addEventListener('click', () => {
                    fetch(`${baseUrl}/remote/answer-challenge?name=${list[0]}&abort=true`).then(() => this.hideChallenge());
                })
                div.getElementsByClassName('input-code').item(0).addEventListener('keyup', () => {
                    const value = div.getElementsByClassName('input-code').item(0).value;
                    if (value.length === 6) {
                        fetch(`${baseUrl}/remote/answer-challenge?name=${list[0]}&code=${value}`).then(() => this.hideChallenge());
                    }
                })

            }
        }

        checkExisting() {
            fetch(`${baseUrl}/remote/challenge`).then(d => d.json()).then(d => {
                if (d.length > 0) {
                    this.showChallenge(d)
                } else {
                    fetch(`${baseUrl}/remote/list`).then(d => d.json()).then(items => {
                        if (items.length > 0) {
                            this.name = items[0];
                            document.getElementsByClassName('remote-controler').item(0).classList.add('visible')
                            document.getElementsByClassName('header-nav').item(0).classList.remove('visible')
                        }
                    })
                }
            })

        }

        loadFolder() {
            this.size = folderSize;
            fetch(`${baseUrl}/remote/send?name=${this.name}&event=folder&data=${currentUrl}`)
        }

        selectImage(pos) {
            this.current = pos;
            this.percent();
            fetch(`${baseUrl}/remote/send?name=${this.name}&event=show&data=${pos}`)
        }

        next() {
            this.current++;
            this.percent();
            fetch(`${baseUrl}/remote/send?name=${this.name}&event=next`)
        }

        previous() {
            this.current--;
            this.percent();
            fetch(`${baseUrl}/remote/send?name=${this.name}&event=previous`)
        }

        percent() {
            const value = Math.ceil(((this.current + 1) / this.size) * 100);
            document.getElementsByClassName('remote-fullscreen').item(0).style.backgroundImage = `linear-gradient(to top, #BBE2FC ${value}%, #07609C ${value + 5}%)`;
            document.getElementsByClassName('current-photo').item(0).innerHTML = this.current;
            document.getElementsByClassName('size-photo').item(0).innerHTML = this.size;

        }
    }


    const touchDetector = new class DetectTouch {
        startTouchH;
        startTouchV;
        currentTouchH;
        currentTouchV;
        blockMove;
        started = false;
        actions = {};

        attachLeft(fct) {
            this.attach("left", fct);
        }

        attachRight(fct) {
            this.attach("right", fct);
        }

        attachTop(fct) {
            this.attach("top", fct);
        }

        attach(kind, fct) {
            this.actions[kind] = fct;
            this.startDetection();
        }

        startDetection() {
            if (this.started) {
                return;
            }
            this.started = true;
            document.addEventListener("touchstart", e => this.start(e))
            document.addEventListener("touchmove", e => this.move(e))
            document.addEventListener("touchend", () => this.end())
        }

        stopDetection() {
            if (Object.values(this.actions).filter(d => d != null).length > 0) {
                return;
            }
            document.removeEventListener("touchstart", () => {
            })
            document.removeEventListener("touchmove", () => {
            })
            document.removeEventListener("touchend", () => {
            })
        }

        action(kind) {
            const act = this.actions[kind];
            if (act != null) {
                act.apply();
            }
            this.reset();
        }

        detach(kinds) {
            kinds.forEach(kind => this.actions[kind] = null)
            this.stopDetection();
        }

        start(e) {
            if(e.target.classList.contains("folder-name")){
                return this.blockMove = true;
            }
            if(e.touches.length > 1){
                // Zoom, stop
                return this.blockMove = true;
            }
            this.startTouchH = e.touches[0].clientX;
            this.startTouchV = e.touches[0].clientY;
        }

        move(e) {
            if(this.blockMove){
                return;
            }
            this.currentTouchH = e.touches[0].clientX;
            this.currentTouchV = e.touches[0].clientY;
        }

        end() {
            if(this.blockMove){
                this.blockMove = false;
                return;
            }
            if (this.currentTouchV - this.startTouchV < -300) {
                return this.action("top");
            }
            if (this.currentTouchH - this.startTouchH < -300) {
                return this.action("right");
            }
            if (this.currentTouchH - this.startTouchH > 300) {
                return this.action("left");
            }
            this.reset();
        }

        reset() {
            this.currentTouchH = 0;
            this.currentTouchV = 0;
            this.startTouchH = 0;
            this.startTouchV = 0;
        }
    }

    document.querySelectorAll('.back-button').forEach(i => i.addEventListener('click', previousFolder))
    document.querySelectorAll('.close-button').forEach(i => i.addEventListener('click', hideImage))
    let rootFolders = [];
    fetch(`${baseUrl}/rootFolders`).then(d => d.json()).then(data=>rootFolders = data)
    document.documentElement.style.setProperty('--width-screen', (window.innerWidth - 20) + 'px');
</script>
